<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>
<form th:action="@{/register}" th:object="${request}" method="post">
    <input type="text" th:field="*{username}" placeholder="Username"><br>
    <input type="password" th:field="*{password}" placeholder="Password"><br>
    <input type="text" th:field="*{nama}" placeholder="Nama"><br>
    <input type="text" th:field="*{alamat}" placeholder="Alamat"><br>
    <button type="submit">Register</button>
</form>

<p>Sudah punya akun? <a th:href="@{/login}">Login disini</a></p>
</body>
</html>
